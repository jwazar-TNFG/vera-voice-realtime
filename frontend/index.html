<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Vera Voice Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Picovoice Porcupine Web SDK v4 -->
    <script src="https://unpkg.com/@picovoice/porcupine-web@4.0.0/dist/iife/index.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        
        .pulse-ring {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }
        
        .listening .pulse-ring {
            animation: listening-pulse 0.8s ease-in-out infinite;
            background: #14b8a6 !important;
        }
        
        @keyframes listening-pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.6; }
        }
        
        .speaking .pulse-ring {
            animation: speaking-pulse 0.5s ease-in-out infinite;
            background: #22c55e !important;
        }
        
        @keyframes speaking-pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        
        .listening .mic-btn {
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
        }
        
        .speaking .mic-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%) !important;
        }
        
        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .realtime-badge {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

        // Connect to WebSocket
        function connect() {
            setStatus('Connecting...', 'gray');
            
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log('Connected to server');
                setStatus('Ready', 'green');
                instruction.textContent = 'Tap to start talking';
                micBtn.disabled = false;
            };
            
            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                
                switch (data.type) {
                    case 'audio':
                        // Received audio chunk from Vera
                        await playAudioChunk(data.audio);
                        break;
                        
                    case 'transcript':
                        // Vera's speech transcript
                        currentTranscript += data.text;
                        transcriptEl.textContent = currentTranscript;
                        transcriptContainer.classList.remove('hidden');
                        break;
                        
                    case 'speech_started':
                        // User started speaking (detected by server VAD)
                        console.log('Speech detected');
                        // Stop Vera if she's speaking (interrupt)
                        if (isSpeaking) {
                            stopVeraAudio();
                            ws.send(JSON.stringify({ type: 'interrupt' }));
                        }
                        break;
                        
                    case 'speech_stopped':
                        // User stopped speaking
                        console.log('Speech ended');
                        break;
                    
                    case 'user_transcript':
                        // User's transcribed speech
                        if (data.text && data.text.trim()) {
                            addMessage(data.text, true);
                        }
                        break;
                        
                    case 'response_done':
                        // Vera finished speaking
                        if (currentTranscript) {
                            addMessage(currentTranscript, false);
                            currentTranscript = '';
                            transcriptContainer.classList.add('hidden');
                        }
                        micContainer.classList.remove('speaking');
                        if (isListening) {
                            setStatus('Listening...', 'teal');
                        }
                        break;
                        
                    case 'error':
                        console.error('Server error:', data.message);
                        setStatus('Error', 'red');
                        break;
                }
            };
            
            ws.onclose = () => {
                console.log('Disconnected');
                setStatus('Disconnected', 'red');
                micBtn.disabled = true;
                instruction.textContent = 'Connection lost. Refresh to reconnect.';
                
                // Attempt reconnect after 3 seconds
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        // Initialize audio context and get microphone
        async function initAudio() {
            try {
                // Get microphone access
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 24000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });
                
                // Create audio context at 24kHz (OpenAI Realtime requirement)
                audioContext = new AudioContext({ sampleRate: 24000 });
                
                // Create source from microphone
                const source = audioContext.createMediaStreamSource(mediaStream);
                
                // Create script processor to capture audio
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
                    
                    const inputData = e.inputBuffer.getChannelData(0);
                    
                    // Convert float32 to int16 PCM
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    
                    // Convert to base64
                    const base64 = btoa(String.fromCharCode(...new Uint8Array(pcm16.buffer)));
                    
                    // Send to server
                    ws.send(JSON.stringify({
                        type: 'audio',
                        audio: base64
                    }));
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                // Initialize playback context
                playbackContext = new AudioContext({ sampleRate: 24000 });
                
                return true;
            } catch (e) {
                console.error('Audio init error:', e);
                setStatus('Mic Error', 'red');
                instruction.textContent = 'Please allow microphone access';
                return false;
            }
        }
        
        // Stop Vera's audio playback (for interrupts)
        function stopVeraAudio() {
            if (playbackContext) {
                playbackContext.close();
                playbackContext = null;
                nextPlayTime = 0;
            }
            isSpeaking = false;
            micContainer.classList.remove('speaking');
            // Reinitialize playback context for next response
            playbackContext = new AudioContext({ sampleRate: 24000 });
        }
        
        // Play audio chunk from OpenAI
        async function playAudioChunk(base64Audio) {
            if (!playbackContext) {
                playbackContext = new AudioContext({ sampleRate: 24000 });
            }
            
            // Show speaking state
            if (!isSpeaking) {
                isSpeaking = true;
                micContainer.classList.add('speaking');
                setStatus('Vera speaking...', 'green');
            }
            
            try {
                // Decode base64 to PCM16
                const binaryString = atob(base64Audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                // Convert PCM16 to Float32
                const pcm16 = new Int16Array(bytes.buffer);
                const float32 = new Float32Array(pcm16.length);
                for (let i = 0; i < pcm16.length; i++) {
                    float32[i] = pcm16[i] / 32768;
                }
                
                // Create audio buffer
                const audioBuffer = playbackContext.createBuffer(1, float32.length, 24000);
                audioBuffer.getChannelData(0).set(float32);
                
                // Schedule playback
                const source = playbackContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(playbackContext.destination);
                
                const currentTime = playbackContext.currentTime;
                if (nextPlayTime < currentTime) {
                    nextPlayTime = currentTime;
                }
                
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
                
                source.onended = () => {
                    // Check if this was the last chunk
                    if (playbackContext.currentTime >= nextPlayTime - 0.1) {
                        isSpeaking = false;
                    }
                };
                
            } catch (e) {
                console.error('Audio playback error:', e);
            }
        }
        
        // Toggle listening
        async function toggleListening() {
            if (isListening) {
                // Stop listening
                isListening = false;
                micContainer.classList.remove('listening');
                setStatus('Ready', 'green');
                instruction.textContent = 'Tap to start talking';
                
                // Commit audio buffer
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'commit' }));
                }
            } else {
                // Start listening
                if (!audioContext) {
                    const success = await initAudio();
                    if (!success) return;
                }
                
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                isListening = true;
                micContainer.classList.add('listening');
                setStatus('Listening...', 'teal');
                instruction.textContent = 'Speak now... tap again to send';
            }
        }
        
        // UI Helpers
        function setStatus(text, color) {
            status.textContent = text;
            status.className = 'text-xs px-3 py-1 rounded-full';
            
            switch (color) {
                case 'green':
                    status.classList.add('bg-green-500/20', 'text-green-400');
                    break;
                case 'teal':
                    status.classList.add('bg-teal-500/20', 'text-teal-400');
                    break;
                case 'red':
                    status.classList.add('bg-red-500/20', 'text-red-400');
                    break;
                default:
                    status.classList.add('bg-gray-500/20', 'text-gray-400');
            }
        }
        
        function addMessage(text, isUser = false, save = true) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3' + (isUser ? ' flex-row-reverse' : '');
            
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full overflow-hidden flex items-center justify-center flex-shrink-0 ${isUser ? 'bg-blue-500' : 'bg-gradient-to-br from-teal-400 to-teal-600'}`;
            avatar.innerHTML = isUser ? '<span class="text-sm">👤</span>' : '<span>🔷</span>';
            
            const bubble = document.createElement('div');
            bubble.className = `rounded-2xl px-4 py-3 max-w-[80%] ${isUser ? 'bg-blue-500/30 rounded-tr-sm' : 'bg-gray-800/50 rounded-tl-sm'}`;
            bubble.innerHTML = `<p class="text-sm">${text}</p>`;
            
            div.appendChild(avatar);
            div.appendChild(bubble);
            chat.appendChild(div);
            
            // Auto-scroll to bottom of chat container
            scrollToBottom();
            
            // Save to localStorage
            if (save) {
                const history = JSON.parse(localStorage.getItem('vera_chat_history') || '[]');
                history.push({ text, isUser, timestamp: Date.now() });
                // Keep last 50 messages
                if (history.length > 50) history.shift();
                localStorage.setItem('vera_chat_history', JSON.stringify(history));
            }
        }
        
        // Scroll to bottom of page (window scrolls, not container)
        function scrollToBottom() {
            // Use requestAnimationFrame to ensure DOM has updated
            requestAnimationFrame(() => {
                window.scrollTo(0, document.body.scrollHeight);
            });
        }
        
        // Load chat history on page load
        function loadChatHistory() {
            const history = JSON.parse(localStorage.getItem('vera_chat_history') || '[]');
            if (history.length === 0) {
                // Show welcome message if no history
                addMessage("Hello! I'm Vera. Tap the microphone to start talking — I'll respond in real-time.", false, false);
            } else {
                history.forEach(msg => addMessage(msg.text, msg.isUser, false));
            }
            // Scroll to bottom after loading
            setTimeout(scrollToBottom, 100);
        }
        
        // Clear chat history
        function clearHistory() {
            localStorage.removeItem('vera_chat_history');
            chat.innerHTML = '';
            // Re-add welcome message
            addMessage("Hello! I'm Vera. Tap the microphone to start talking — I'll respond in real-time.", false, false);
        }
        
        // ========== WAKE WORD DETECTION ==========
        
        // Initialize Porcupine wake word detector
        async function initPorcupine() {
            try {
                console.log('Initializing Porcupine...');
                
                porcupine = await PorcupineWeb.PorcupineWorker.create(
                    PICOVOICE_ACCESS_KEY,
                    [{
                        base64: HEY_VERA_KEYWORD_BASE64,
                        label: 'Hey Vera'
                    }],
                    keywordDetectionCallback,
                    {
                        publicPath: './porcupine_params.pv',
                        forceWrite: true
                    }
                );
                
                console.log('Porcupine initialized successfully');
                return true;
            } catch (e) {
                console.error('Failed to initialize Porcupine:', e);
                return false;
            }
        }
        
        // Callback when wake word is detected
        function keywordDetectionCallback(detection) {
            if (detection.index >= 0) {
                console.log('Wake word detected: Hey Vera!');
                
                if (!isListening && !isSpeaking) {
                    // Haptic feedback
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    
                    // Start listening
                    toggleListening();
                }
            }
        }
        
        async function startWakeWordListening() {
            if (!porcupine) {
                const success = await initPorcupine();
                if (!success) {
                    console.error('Could not initialize wake word detection');
                    setStatus('Wake Error', 'red');
                    return;
                }
            }
            
            try {
                webVoiceProcessor = await WebVoiceProcessor.WebVoiceProcessor.subscribe(porcupine);
                console.log('Wake word listening started');
                setStatus('Say "Hey Vera"', 'teal');
                instruction.textContent = 'Say "Hey Vera" to start...';
            } catch (e) {
                console.error('Failed to start wake word listening:', e);
                setStatus('Mic Error', 'red');
            }
        }
        
        async function stopWakeWordListening() {
            if (webVoiceProcessor && porcupine) {
                try {
                    await WebVoiceProcessor.WebVoiceProcessor.unsubscribe(porcupine);
                    webVoiceProcessor = null;
                } catch (e) {
                    console.error('Error stopping wake word listener:', e);
                }
            }
        }
        
        async function toggleWakeWord() {
            wakeWordEnabled = !wakeWordEnabled;
            const wakeStatus = document.getElementById('wake-status');
            
            if (wakeWordEnabled) {
                wakeStatus.textContent = 'On';
                wakeStatus.classList.remove('text-gray-500');
                wakeStatus.classList.add('text-teal-400');
                await startWakeWordListening();
            } else {
                wakeStatus.textContent = 'Off';
                wakeStatus.classList.remove('text-teal-400');
                wakeStatus.classList.add('text-gray-500');
                await stopWakeWordListening();
                if (!isListening) {
                    setStatus('Ready', 'green');
                    instruction.textContent = 'Type or tap mic to speak';
                }
            }
        }
        
        // ========== END WAKE WORD ==========
        
        // ========== TEXT INPUT ==========
        
        function sendTextMessage() {
            const text = textInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            // Add user message to chat
            addMessage(text, true);
            
            // Send to server
            ws.send(JSON.stringify({
                type: 'text',
                text: text
            }));
            
            // Clear input
            textInput.value = '';
            
            // Update status
            setStatus('Processing...', 'teal');
        }
        
        let textInputEnabled = false;
        
        function toggleTextInput() {
            textInputEnabled = !textInputEnabled;
            const textStatus = document.getElementById('text-status');
            const textInputRow = document.getElementById('text-input-row');
            
            if (textInputEnabled) {
                textStatus.textContent = 'On';
                textStatus.classList.remove('text-gray-500');
                textStatus.classList.add('text-teal-400');
                textInputRow.classList.remove('hidden');
                textInputRow.classList.add('flex');
            } else {
                textStatus.textContent = 'Off';
                textStatus.classList.remove('text-teal-400');
                textStatus.classList.add('text-gray-500');
                textInputRow.classList.add('hidden');
                textInputRow.classList.remove('flex');
            }
        }
        
        // ========== END TEXT INPUT ==========
        
        // Event listeners
        micBtn.addEventListener('click', toggleListening);
        wakeToggle.addEventListener('click', toggleWakeWord);
        document.getElementById('text-toggle').addEventListener('click', toggleTextInput);
        
        // Text input events
        sendBtn.addEventListener('click', sendTextMessage);
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendTextMessage();
            }
        });
        
        // Settings menu toggle
        const settingsBtn = document.getElementById('settings-btn');
        const settingsMenu = document.getElementById('settings-menu');
        
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('hidden');
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', () => {
            settingsMenu.classList.add('hidden');
        });
        
        // Clear history button
        document.getElementById('clear-btn').addEventListener('click', () => {
            clearHistory();
            settingsMenu.classList.add('hidden');
        });
        
        // Keyboard shortcut (spacebar)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                toggleListening();
            }
        });
        
        // Initialize
        loadChatHistory();
        connect();
    </script>
</body>
</html>
