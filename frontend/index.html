<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Voice Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        
        .pulse-ring {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }
        
        .listening .pulse-ring {
            animation: listening-pulse 0.8s ease-in-out infinite;
            background: #14b8a6 !important;
        }
        
        @keyframes listening-pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.6; }
        }
        
        .speaking .pulse-ring {
            animation: speaking-pulse 0.5s ease-in-out infinite;
            background: #22c55e !important;
        }
        
        @keyframes speaking-pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        
        .listening .mic-btn {
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
        }
        
        .speaking .mic-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%) !important;
        }
        
        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .realtime-badge {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col">
    <!-- Header -->
    <header class="p-4 border-b border-gray-800 sticky top-0 bg-[#0a0a0a]/95 backdrop-blur-sm z-50">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full overflow-hidden bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center">
                    <span class="text-xl">🔷</span>
                </div>
                <div>
                    <h1 class="font-bold text-lg">Vera <span class="realtime-badge text-sm font-normal">Realtime</span></h1>
                    <p class="text-xs text-gray-400">AI Executive Assistant</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="clear-btn" class="text-xs px-2 py-1 rounded-full bg-gray-700/50 text-gray-400 hover:bg-gray-600/50 transition-colors" title="Clear chat history">
                    🗑️
                </button>
                <div id="latency" class="text-xs px-2 py-1 rounded-full bg-gray-700/50 text-gray-400 hidden">
                    --ms
                </div>
                <div id="status" class="text-xs px-3 py-1 rounded-full bg-gray-500/20 text-gray-400">
                    Connecting...
                </div>
            </div>
        </div>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-y-auto p-4">
        <div id="chat" class="max-w-2xl mx-auto space-y-4">
            <!-- Welcome message -->
            <div class="message-bubble flex gap-3">
                <div class="w-8 h-8 rounded-full overflow-hidden bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center flex-shrink-0">
                    <span>🔷</span>
                </div>
                <div class="bg-gray-800/50 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                    <p class="text-sm">Hello! I'm Vera. Tap the microphone to start talking — I'll respond in real-time.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Live Transcript -->
    <div id="transcript-container" class="hidden px-4 pb-2">
        <div class="max-w-2xl mx-auto">
            <div id="transcript" class="text-sm text-gray-400 italic bg-gray-800/30 rounded-lg px-4 py-2"></div>
        </div>
    </div>

    <!-- Voice Control -->
    <footer class="p-6 border-t border-gray-800 sticky bottom-0 bg-gradient-to-t from-[#0a0a0a] to-[#0a0a0a]/95 backdrop-blur-sm">
        <div class="max-w-2xl mx-auto flex flex-col items-center">
            <div id="mic-container" class="relative">
                <div class="pulse-ring absolute inset-0 rounded-full bg-gray-500/30"></div>
                <button 
                    id="mic-btn"
                    class="mic-btn relative w-20 h-20 rounded-full bg-gradient-to-br from-gray-600 to-gray-700 flex items-center justify-center shadow-lg transition-all active:scale-95 disabled:opacity-50"
                    disabled
                >
                    <svg id="mic-icon" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                    </svg>
                </button>
            </div>
            <p id="instruction" class="text-gray-500 text-sm mt-4">
                Connecting to server...
            </p>
        </div>
    </footer>

    <script>
        // Configuration
        const WS_URL = 'wss://vera-voice-realtime-production.up.railway.app/ws';
        
        // DOM Elements
        const micBtn = document.getElementById('mic-btn');
        const micContainer = document.getElementById('mic-container');
        const status = document.getElementById('status');
        const instruction = document.getElementById('instruction');
        const chat = document.getElementById('chat');
        const transcriptContainer = document.getElementById('transcript-container');
        const transcriptEl = document.getElementById('transcript');
        const latencyEl = document.getElementById('latency');
        
        // State
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let audioWorklet = null;
        let isListening = false;
        let isSpeaking = false;
        let currentTranscript = '';
        let audioQueue = [];
        let isPlayingAudio = false;
        
        // Audio playback
        let playbackContext = null;
        let nextPlayTime = 0;
        
        // Connect to WebSocket
        function connect() {
            setStatus('Connecting...', 'gray');
            
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log('Connected to server');
                setStatus('Ready', 'green');
                instruction.textContent = 'Tap to start talking';
                micBtn.disabled = false;
            };
            
            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                
                switch (data.type) {
                    case 'audio':
                        // Received audio chunk from Vera
                        await playAudioChunk(data.audio);
                        break;
                        
                    case 'transcript':
                        // Vera's speech transcript
                        currentTranscript += data.text;
                        transcriptEl.textContent = currentTranscript;
                        transcriptContainer.classList.remove('hidden');
                        break;
                        
                    case 'speech_started':
                        // User started speaking (detected by server VAD)
                        console.log('Speech detected');
                        break;
                        
                    case 'speech_stopped':
                        // User stopped speaking
                        console.log('Speech ended');
                        break;
                    
                    case 'user_transcript':
                        // User's transcribed speech
                        if (data.text && data.text.trim()) {
                            addMessage(data.text, true);
                        }
                        break;
                        
                    case 'response_done':
                        // Vera finished speaking
                        if (currentTranscript) {
                            addMessage(currentTranscript, false);
                            currentTranscript = '';
                            transcriptContainer.classList.add('hidden');
                        }
                        micContainer.classList.remove('speaking');
                        if (isListening) {
                            setStatus('Listening...', 'teal');
                        }
                        break;
                        
                    case 'error':
                        console.error('Server error:', data.message);
                        setStatus('Error', 'red');
                        break;
                }
            };
            
            ws.onclose = () => {
                console.log('Disconnected');
                setStatus('Disconnected', 'red');
                micBtn.disabled = true;
                instruction.textContent = 'Connection lost. Refresh to reconnect.';
                
                // Attempt reconnect after 3 seconds
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        // Initialize audio context and get microphone
        async function initAudio() {
            try {
                // Get microphone access
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 24000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });
                
                // Create audio context at 24kHz (OpenAI Realtime requirement)
                audioContext = new AudioContext({ sampleRate: 24000 });
                
                // Create source from microphone
                const source = audioContext.createMediaStreamSource(mediaStream);
                
                // Create script processor to capture audio
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
                    
                    const inputData = e.inputBuffer.getChannelData(0);
                    
                    // Convert float32 to int16 PCM
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    
                    // Convert to base64
                    const base64 = btoa(String.fromCharCode(...new Uint8Array(pcm16.buffer)));
                    
                    // Send to server
                    ws.send(JSON.stringify({
                        type: 'audio',
                        audio: base64
                    }));
                };
                
                source.connect(processor);
                processor.connect(audioContext.destination);
                
                // Initialize playback context
                playbackContext = new AudioContext({ sampleRate: 24000 });
                
                return true;
            } catch (e) {
                console.error('Audio init error:', e);
                setStatus('Mic Error', 'red');
                instruction.textContent = 'Please allow microphone access';
                return false;
            }
        }
        
        // Play audio chunk from OpenAI
        async function playAudioChunk(base64Audio) {
            if (!playbackContext) {
                playbackContext = new AudioContext({ sampleRate: 24000 });
            }
            
            // Show speaking state
            if (!isSpeaking) {
                isSpeaking = true;
                micContainer.classList.add('speaking');
                setStatus('Vera speaking...', 'green');
            }
            
            try {
                // Decode base64 to PCM16
                const binaryString = atob(base64Audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                // Convert PCM16 to Float32
                const pcm16 = new Int16Array(bytes.buffer);
                const float32 = new Float32Array(pcm16.length);
                for (let i = 0; i < pcm16.length; i++) {
                    float32[i] = pcm16[i] / 32768;
                }
                
                // Create audio buffer
                const audioBuffer = playbackContext.createBuffer(1, float32.length, 24000);
                audioBuffer.getChannelData(0).set(float32);
                
                // Schedule playback
                const source = playbackContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(playbackContext.destination);
                
                const currentTime = playbackContext.currentTime;
                if (nextPlayTime < currentTime) {
                    nextPlayTime = currentTime;
                }
                
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
                
                source.onended = () => {
                    // Check if this was the last chunk
                    if (playbackContext.currentTime >= nextPlayTime - 0.1) {
                        isSpeaking = false;
                    }
                };
                
            } catch (e) {
                console.error('Audio playback error:', e);
            }
        }
        
        // Toggle listening
        async function toggleListening() {
            if (isListening) {
                // Stop listening
                isListening = false;
                micContainer.classList.remove('listening');
                setStatus('Ready', 'green');
                instruction.textContent = 'Tap to start talking';
                
                // Commit audio buffer
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'commit' }));
                }
            } else {
                // Start listening
                if (!audioContext) {
                    const success = await initAudio();
                    if (!success) return;
                }
                
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                isListening = true;
                micContainer.classList.add('listening');
                setStatus('Listening...', 'teal');
                instruction.textContent = 'Speak now... tap again to send';
            }
        }
        
        // UI Helpers
        function setStatus(text, color) {
            status.textContent = text;
            status.className = 'text-xs px-3 py-1 rounded-full';
            
            switch (color) {
                case 'green':
                    status.classList.add('bg-green-500/20', 'text-green-400');
                    break;
                case 'teal':
                    status.classList.add('bg-teal-500/20', 'text-teal-400');
                    break;
                case 'red':
                    status.classList.add('bg-red-500/20', 'text-red-400');
                    break;
                default:
                    status.classList.add('bg-gray-500/20', 'text-gray-400');
            }
        }
        
        function addMessage(text, isUser = false, save = true) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3' + (isUser ? ' flex-row-reverse' : '');
            
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full overflow-hidden flex items-center justify-center flex-shrink-0 ${isUser ? 'bg-blue-500' : 'bg-gradient-to-br from-teal-400 to-teal-600'}`;
            avatar.innerHTML = isUser ? '<span class="text-sm">👤</span>' : '<span>🔷</span>';
            
            const bubble = document.createElement('div');
            bubble.className = `rounded-2xl px-4 py-3 max-w-[80%] ${isUser ? 'bg-blue-500/30 rounded-tr-sm' : 'bg-gray-800/50 rounded-tl-sm'}`;
            bubble.innerHTML = `<p class="text-sm">${text}</p>`;
            
            div.appendChild(avatar);
            div.appendChild(bubble);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            
            // Save to localStorage
            if (save) {
                const history = JSON.parse(localStorage.getItem('vera_chat_history') || '[]');
                history.push({ text, isUser, timestamp: Date.now() });
                // Keep last 50 messages
                if (history.length > 50) history.shift();
                localStorage.setItem('vera_chat_history', JSON.stringify(history));
            }
        }
        
        // Load chat history on page load
        function loadChatHistory() {
            const history = JSON.parse(localStorage.getItem('vera_chat_history') || '[]');
            history.forEach(msg => addMessage(msg.text, msg.isUser, false));
        }
        
        // Clear chat history
        function clearHistory() {
            localStorage.removeItem('vera_chat_history');
            chat.innerHTML = '';
            // Re-add welcome message
            addMessage("Hello! I'm Vera. Tap the microphone to start talking — I'll respond in real-time.", false, false);
        }
        
        // Event listeners
        micBtn.addEventListener('click', toggleListening);
        document.getElementById('clear-btn').addEventListener('click', clearHistory);
        
        // Keyboard shortcut (spacebar)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                toggleListening();
            }
        });
        
        // Initialize
        loadChatHistory();
        connect();
    </script>
</body>
</html>
